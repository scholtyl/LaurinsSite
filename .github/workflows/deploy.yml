# .github/workflows/deploy.yml
name: Deploy to Synology NAS

on:
  push:
    branches:
      - main

env:
  BUILD_ID: "${{ github.run_number }}-${{ github.sha }}"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Print build info
      run: |
        echo "Build ID: $BUILD_ID"

    - name: 🛒 Checkout code
      uses: actions/checkout@v3

    - name: 🧰 Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: 🔨 Build backend
      run: |
        cd backend
        npm run build

    - name: 📦 Install frontend dependencies
      run: |
        cd frontend
        export NG_BUILD_ID="$BUILD_ID"
        npm ci

    # - name: 🔨 Build frontend
    #   run: |
    #     cd frontend
    #     export BUILD_ID="$BUILD_ID"
    #     npm run build

    # - name: Debug local frontend/dist and backend/dist content
    #   run: |
    #     ls -la backend/dist
    #     ls -la frontend/dist
        
    - name: 🚚 Deploy via rsync
      uses: burnett01/rsync-deployments@5.2
      with:
        switches: -avzr --exclude='uploads/' --exclude='db.sqlite'
        path: |
          backend/dist
        remote_path: /volume1/web/LaurinsSite
        remote_host: ${{ secrets.NAS_HOST }}
        remote_user: ${{ secrets.NAS_USER }}
        remote_key: ${{ secrets.NAS_SSH_KEY }}
        remote_port: 2222

    # - name: 🔁 Restart PM2 app on NAS
    #   run: |
    #     echo "${{ secrets.NAS_SSH_KEY }}" > key.pem
    #     chmod 600 key.pem
    #     ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} 'pm2 restart laurinsSite-backend'

      # - name: 🧹 Clean up SSH key
