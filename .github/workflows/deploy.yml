# .github/workflows/deploy.yml
name: Deploy to Synology NAS

on:
  push:
    branches:
      - Release

env:
  BUILD_ID: "${{ github.run_number }}-${{ github.sha }}"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
    - name: Print build info
      run: |
        echo "Build ID: $BUILD_ID"

    - name: 🛒 Checkout code
      uses: actions/checkout@v3

    - name: 🧰 Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        npm ci
        npm install --save-dev @types/express @types/bcrypt @types/multer @types/jsonwebtoken

    - name: 🔨 Build backend
      run: |
        cd backend
        npm run build

    - name: 📦 Install frontend dependencies
      run: |
        cd frontend
        export NG_BUILD_ID="$BUILD_ID"
        npm ci

    - name: 🔨 Build frontend
      run: |
        cd frontend
        export BUILD_ID="$BUILD_ID"
        npm run build

    - name: 🚚 Deploy to NAS with rsync
      run: |
        echo "${{ secrets.NAS_SSH_KEY }}" > id_ed25519
        chmod 600 id_ed25519

        # Rsync backend
        rsync -avz -e "ssh -i id_ed25519 -p 2222 -o StrictHostKeyChecking=no" \
          backend/dist/ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/web/LaurinsSite/backend/

        # Rsync frontend
        rsync -avz -e "ssh -i id_ed25519 -p 2222 -o StrictHostKeyChecking=no" \
          frontend/dist/ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/web/LaurinsSite/frontend/

      shell: bash
